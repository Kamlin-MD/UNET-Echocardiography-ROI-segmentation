[tox]
envlist = py310, py311, py312
isolated_build = True

[testenv]
deps =
    pytest>=7.0
    pytest-cov>=4.0
commands =
    pytest tests/ -v --tb=short {posargs}

[testenv:lint]
deps = ruff>=0.4
commands = ruff check echoroi/ tests/

[testenv:install-test]
skip_install = True
deps =
commands =
    pip install .
    echoroi --help
    python -c "from echoroi.model import UNetModel; print('OK')"
    pip install pytest
    pytest tests/ -v --tb=short
