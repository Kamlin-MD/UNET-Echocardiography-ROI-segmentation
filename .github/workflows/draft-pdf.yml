name: Draft PDF

on:
  push:
    branches: [main]
    paths:
      - 'paper/**'
  pull_request:
    branches: [main]
    paths:
      - 'paper/**'

jobs:
  paper:
    runs-on: ubuntu-latest
    name: JOSS Paper Draft
    steps:
      - uses: actions/checkout@v4
      - uses: openjournals/openjournals-draft-action@v1
        with:
          journal: joss
          paper-path: paper/paper.md
      - uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper/paper.pdf
