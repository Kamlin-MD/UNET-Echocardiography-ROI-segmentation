name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check echoroi/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=echoroi --cov-report=term-missing

  install-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install from source
        run: pip install .
      - name: Verify CLI entry point works
        run: echoroi --help
      - name: Verify core imports
        run: |
          python -c "from echoroi.model import UNetModel; print('model OK')"
          python -c "from echoroi.preprocessing import UltrasoundPreprocessor; print('preprocessing OK')"
          python -c "from echoroi.inference import UNetPredictor; print('inference OK')"
      - name: Install test dependencies and run tests
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v --tb=short
